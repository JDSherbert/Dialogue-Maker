<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dialogue Maker</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        textarea {
            width: 400px;
            height: 300px;
        }

        #preview {
            width: 400px;
            min-height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
        }

        .shake {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

<div>
    <h3>Dialogue Input</h3>
    <textarea id="dialogueInput"></textarea>
    <br><br>
    <button id="exportBtn">Export JSON</button>
</div>

<div>
    <h3>Preview</h3>
    <div id="preview"></div>
</div>

<script type="module" src="./main.js"></script>

</body>
</html>
